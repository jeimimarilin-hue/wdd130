<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact White Water Rafting for questions, reservations, or feedback. We are located in the heart of the mountains.">
    <meta name="author" content="Jeimi Diaz Mariani">
    <title>Contact Us | White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="Rafting Company Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <section class="contact-layout">
            <div class="contact-header">
                <h1>Contact Us</h1>
                <div class="address">
                    <h2>Our Office</h2>
                    <p>Burro Negro Aqua Park, Ojeda City, Zulia State, Venezuela.</p>
                    <p>📞 Phone: +58 424-1234567</p>
                    <p>📧 Email: splashww@rafting.com</p>
                </div>
            </div>

            <div class="contact-grid">
                <div class="map">
                    <iframe
                      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3927.091827200261!2d-71.0506481258517!3d10.173191189941225!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8e882f1ce1b86d39%3A0x8de4c816ea603d68!2sparque%20burro%20negro%2C%20Zulia!5e0!3m2!1ses!2sve!4v1775158735093!5m2!1ses!2sve"
                      referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>

                <form class="contact-form" action="Thanks.html" method="get">
                    <h2>Contact Us</h2>
                    <div class="form-item">
                        <label for="name">Name</label> <input type="text" id="name" name="name"
                          placeholder="Placeholder" required>
                    </div>

                    <div class="form-item">
                        <label for="email">Email</label> <input type="email" id="email" name="email"
                          placeholder="Placeholder" required>
                    </div>

                    <fieldset class="purpose-section">
                        <legend class="left-label">Message Purpose</legend>

                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="purpose" value="general"> General Inquiry
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="purpose" value="reservation"> Reservation
                                Question
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="purpose" value="web site"> Website
                                Suggestion
                            </label>
                        </div>
                    </fieldset>

                    <div class="form-item-area">
                        <label for="message">Message</label> <textarea id="message" name="message"
                          rows="4" placeholder="Type here"></textarea>
                    </div>

                    <div class="form-item-checkbox">
                        <input type="checkbox" id="subscribe" name="subscribe">
                        <label for="subscribe">Please Subscribe me to the monthly newsletter</label>
                    </div>

                    <button type="submit" class="submit-button">Get in Touch!</button>
                </form>
            </div>
        </section>

        <section class="team">
            <h2>We are here to serve you</h2>
            <div class="team-grid">
                <figure>
                    <img src="../images/team-Jeimi's-photo.jpg" alt="Manager profile">
                    <figcaption><strong>Jeimi Diaz Mariani</strong> - CEO & Founder</figcaption>
                </figure>
                <figure>
                    <img src="../images/team-Jeimi's-photo2.jpeg" alt="Manager profile">
                    <figcaption><strong>Alexa Smith</strong> - Lead River Guide</figcaption>
                </figure>
                <figure>
                    <img src="../images/team-Jeimi's-photo3.jpeg" alt="Manager profile">
                    <figcaption><strong>Emma Hills</strong> - Safety Coordinator</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy;2026 😊 Jeimi Diaz Mariani 😊 Zulia, Venezuela.</p>
        <nav class="socialmedia">
            <a href="https://facebook.com" target="_blank">
                <img src="images/facebook.png" alt="By clicking here you can visit Facebook.com">
            </a>
            <a href="https://twitter.com" target="_blank">
                <img src="images/twitter.png" alt="By clicking here you can visit Twitter">
            </a>
            <a href="https://instagram.com" target="_blank">
                <img src="images/instagram.png" alt="By clicking here you can visit Instagram">
            </a>
        </nav>
    </footer>
</body>

</html>
